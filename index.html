<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zylite Explorer</title>
<link rel="icon" type="image/png" href="Zylite_png.png" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>

<style>
:root{
  --bg:#0D1117;
  --panel:#161B22;

  --tab-active:#3FB950;
  --tab-inactive:#161B22;

  --text:#E6EDF3;
  --muted:#8B949E;

  --accent:#3FB950;
  --accent-soft:rgba(63,185,80,0.15);
  --accent-hover:#2EA043;

  --border:rgba(255,255,255,0.06);

  --scrollbar-bg:#0D1117;
  --scrollbar-thumb:#21262D;
  --scrollbar-thumb-hover:#30363D;
}

html,body{
  height:100%;margin:0;
  background:var(--bg);
  font-family:'Fira Code','Courier New',monospace;
}

#app{display:flex;height:100vh;width:100vw;color:var(--text);}

/* scroll */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--scrollbar-bg);}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover);}

/* right */
#right{
  flex:1;display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
}

/* tabs */
#tabs-bar{
  height:44px;
  display:flex;align-items:center;gap:4px;
  padding:6px 8px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

.tab{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  border-radius:4px;
  border:1px solid transparent;
  background:rgba(255,255,255,0.03);
  color:var(--muted);
  cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  position:relative;
}

.tab:hover{
  background:var(--accent-soft);
  border-color:var(--accent);
  color:#fff;
}

.tab.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#0D1117;
  box-shadow:0 0 10px rgba(63,185,80,0.3);
}

.tab.active::after{
  content:'';
  position:absolute;
  bottom:-1px;left:0;
  width:100%;height:2px;
  background:var(--accent);
}

.tab .close{
  opacity:.4;
}
.tab .close:hover{
  opacity:1;
}

#tab-add,#btn-clear,.tab-bar-btn{
  background:transparent;border:none;
  cursor:pointer;padding:5px;
  border-radius:6px;
  color:var(--muted);
}

#tab-add:hover,#btn-clear:hover,.tab-bar-btn:hover{
  color:#fff;
  background:rgba(255,255,255,0.05);
}

/* editor */
#editor-wrap{flex:1;overflow:hidden;}
#editor{height:100%;}

/* toast (giữ nguyên style cũ nhưng tweak nhẹ) */
.toast{
  background:#161B22;
  border:1px solid var(--border);
}
</style>

</head>
<body>

<div id="app">
  <div id="right">
    <div id="tabs-bar">
      <button id="tab-add">+</button>

```
  <button class="tab-bar-btn" id="btn-open">📂</button>
  <button class="tab-bar-btn" id="btn-save">💾</button>
  <button id="btn-clear">🗑</button>
</div>

<div id="editor-wrap">
  <div id="editor"></div>
</div>
```

  </div>
</div>

<script>
require.config({paths:{'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs'}});

require(['vs/editor/editor.main'],function(){

  monaco.editor.defineTheme('zyliteTheme',{
    base:'vs-dark',
    inherit:true,
    rules:[
      {token:'keyword',foreground:'3FB950',fontStyle:'bold'},
      {token:'string',foreground:'7EE787'},
      {token:'number',foreground:'79C0FF'},
      {token:'comment',foreground:'8B949E',fontStyle:'italic'}
    ],
    colors:{
      'editor.background':'#0D1117',
      'editorCursor.foreground':'#3FB950',
      'editor.selectionBackground':'rgba(63,185,80,0.2)',
      'editor.lineHighlightBackground':'rgba(255,255,255,0.03)'
    }
  });

  const editor=monaco.editor.create(document.getElementById('editor'),{
    value:'-- Zylite IDE 🌿\nprint("hello world")',
    language:'lua',
    theme:'zyliteTheme',
    fontSize:13,
    minimap:{enabled:true},
    cursorBlinking:'smooth',
    automaticLayout:true
  });

});
</script>

</body>
</html>
